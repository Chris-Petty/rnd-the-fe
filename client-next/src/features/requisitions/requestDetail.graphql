mutation useSuggested($storeId: String!, $input: UseSuggestedQuantityInput!) {
  useSuggestedQuantity(storeId: $storeId, input: $input) {
    __typename
    ... on RequisitionLineConnector {
      totalCount
    }
    ... on UseSuggestedQuantityError {
      error {
        __typename
        description
      }
    }
  }
}
