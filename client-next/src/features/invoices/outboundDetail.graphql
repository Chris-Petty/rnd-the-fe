fragment OutboundLineRow on InvoiceLineNode {
  __typename
  id
  itemId
  itemName
  itemCode
  batch
  expiryDate
  packSize
  numberOfPacks
  sellPricePerPack
  note
  item {
    __typename
    id
    code
    name
    unitName
  }
}

fragment OutboundDetail on InvoiceNode {
  __typename
  id
  invoiceNumber
  type
  status
  onHold
  theirReference
  comment
  colour
  otherPartyName
  createdDatetime
  allocatedDatetime
  pickedDatetime
  shippedDatetime
  deliveredDatetime
  verifiedDatetime
  user {
    __typename
    username
  }
  pricing {
    __typename
    totalAfterTax
  }
  lines {
    __typename
    totalCount
    nodes {
      ...OutboundLineRow
    }
  }
}

query outboundShipment($storeId: String!, $invoiceId: String!) {
  invoice(storeId: $storeId, id: $invoiceId) {
    ... on InvoiceNode {
      ...OutboundDetail
    }
  }
}

mutation insertOutbound(
  $storeId: String!
  $input: InsertOutboundShipmentInput!
) {
  insertOutboundShipment(storeId: $storeId, input: $input) {
    __typename
    ... on InvoiceNode {
      id
    }
    ... on InsertOutboundShipmentError {
      error {
        __typename
        description
      }
    }
    ... on NodeError {
      error {
        __typename
        description
      }
    }
  }
}

mutation updateOutbound(
  $storeId: String!
  $input: UpdateOutboundShipmentInput!
) {
  updateOutboundShipment(storeId: $storeId, input: $input) {
    __typename
    ... on InvoiceNode {
      id
      status
    }
    ... on UpdateOutboundShipmentError {
      error {
        __typename
        description
      }
    }
    ... on NodeError {
      error {
        __typename
        description
      }
    }
  }
}

