fragment CustomerReturnLineRow on InvoiceLineNode {
  __typename
  id
  itemId
  itemName
  itemCode
  batch
  expiryDate
  packSize
  numberOfPacks
  sellPricePerPack
  item {
    __typename
    id
    code
    name
    unitName
  }
}

fragment CustomerReturnDetail on InvoiceNode {
  __typename
  id
  invoiceNumber
  type
  status
  onHold
  theirReference
  comment
  colour
  otherPartyName
  createdDatetime
  pickedDatetime
  shippedDatetime
  receivedDatetime
  verifiedDatetime
  linkedShipment {
    __typename
    id
  }
  user {
    __typename
    username
  }
  pricing {
    __typename
    totalAfterTax
  }
  lines {
    __typename
    totalCount
    nodes {
      ...CustomerReturnLineRow
    }
  }
}

query customerReturn($storeId: String!, $invoiceId: String!) {
  invoice(storeId: $storeId, id: $invoiceId) {
    ... on InvoiceNode {
      ...CustomerReturnDetail
    }
  }
}

mutation updateCustomerReturn(
  $storeId: String!
  $input: UpdateCustomerReturnInput!
) {
  updateCustomerReturn(storeId: $storeId, input: $input) {
    __typename
    ... on InvoiceNode {
      id
      status
    }
    ... on UpdateCustomerReturnError {
      error {
        __typename
        description
      }
    }
  }
}
