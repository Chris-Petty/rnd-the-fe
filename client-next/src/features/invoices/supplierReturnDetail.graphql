fragment SupplierReturnLineRow on InvoiceLineNode {
  __typename
  id
  itemId
  itemName
  itemCode
  batch
  expiryDate
  packSize
  numberOfPacks
  costPricePerPack
  sellPricePerPack
  item {
    __typename
    id
    code
    name
    unitName
  }
}

fragment SupplierReturnDetail on InvoiceNode {
  __typename
  id
  invoiceNumber
  type
  status
  onHold
  theirReference
  comment
  colour
  otherPartyName
  createdDatetime
  pickedDatetime
  shippedDatetime
  deliveredDatetime
  receivedDatetime
  verifiedDatetime
  lines {
    __typename
    totalCount
    nodes {
      ...SupplierReturnLineRow
    }
  }
}

query supplierReturn($storeId: String!, $invoiceId: String!) {
  invoice(storeId: $storeId, id: $invoiceId) {
    ... on InvoiceNode {
      ...SupplierReturnDetail
    }
  }
}

mutation updateSupplierReturn(
  $storeId: String!
  $input: UpdateSupplierReturnInput!
) {
  updateSupplierReturn(storeId: $storeId, input: $input) {
    __typename
    ... on InvoiceNode {
      id
      status
    }
  }
}
