fragment InboundLineRow on InvoiceLineNode {
  __typename
  id
  itemId
  itemName
  itemCode
  batch
  expiryDate
  manufactureDate
  packSize
  numberOfPacks
  costPricePerPack
  sellPricePerPack
  note
  item {
    __typename
    id
    code
    name
    unitName
  }
  location {
    __typename
    id
    code
  }
}

fragment InboundDetail on InvoiceNode {
  __typename
  id
  invoiceNumber
  type
  status
  onHold
  theirReference
  comment
  colour
  otherPartyName
  createdDatetime
  deliveredDatetime
  receivedDatetime
  verifiedDatetime
  user {
    __typename
    username
  }
  pricing {
    __typename
    totalAfterTax
  }
  lines {
    __typename
    totalCount
    nodes {
      ...InboundLineRow
    }
  }
}

query inboundShipment($storeId: String!, $invoiceId: String!) {
  invoice(storeId: $storeId, id: $invoiceId) {
    ... on InvoiceNode {
      ...InboundDetail
    }
  }
}

mutation insertInbound($storeId: String!, $input: InsertInboundShipmentInput!) {
  insertInboundShipment(storeId: $storeId, input: $input) {
    __typename
    ... on InvoiceNode {
      id
    }
    ... on InsertInboundShipmentError {
      error {
        __typename
        description
      }
    }
  }
}

mutation updateInbound($storeId: String!, $input: UpdateInboundShipmentInput!) {
  updateInboundShipment(storeId: $storeId, input: $input) {
    __typename
    ... on InvoiceNode {
      id
      status
    }
    ... on UpdateInboundShipmentError {
      error {
        __typename
        description
      }
    }
  }
}

mutation updateInboundLine(
  $storeId: String!
  $input: UpdateInboundShipmentLineInput!
) {
  updateInboundShipmentLine(storeId: $storeId, input: $input) {
    __typename
    ... on InvoiceLineNode {
      id
    }
    ... on UpdateInboundShipmentLineError {
      error {
        __typename
        description
      }
    }
  }
}

mutation insertInboundLine(
  $storeId: String!
  $input: InsertInboundShipmentLineInput!
) {
  insertInboundShipmentLine(storeId: $storeId, input: $input) {
    __typename
    ... on InvoiceLineNode {
      id
    }
    ... on InsertInboundShipmentLineError {
      error {
        __typename
        description
      }
    }
  }
}

mutation deleteInboundLine(
  $storeId: String!
  $input: DeleteInboundShipmentLineInput!
) {
  deleteInboundShipmentLine(storeId: $storeId, input: $input) {
    __typename
    ... on DeleteResponse {
      id
    }
    ... on DeleteInboundShipmentLineError {
      error {
        __typename
        description
      }
    }
  }
}
